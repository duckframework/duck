<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic SEO + compatibility -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prevent indexing of this redirect page -->
    <meta name="robots" content="noindex, follow" />

    <title>Redirecting...</title>

    <!-- Canonical target (helps search engines understand destination) -->
    <link rel="canonical" href="/main/index.html" />

    <script>
      // Immediate, SEO-safe redirect (does not pollute history)
      window.location.replace("/main/index.html");
    </script>
  </head>

  <body>
    <!-- Fallback for users / bots without JS -->
    <noscript>
      <p>
        This page has moved.
        <a href="/main/index.html">Click here to continue</a>.
      </p>
    </noscript>

    <!-- Visible fallback -->
    <p>
      Redirecting... If you are not redirected,
      <a href="/main/index.html">click here</a>.
    </p>
  </body>
</html>
